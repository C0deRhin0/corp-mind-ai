version: "3.9"
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://host-gateway:11434
    depends_on:
      - qdrant
    extra_hosts:
      - "host-gateway:host-gateway"   # lets container reach Ollama on host

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
